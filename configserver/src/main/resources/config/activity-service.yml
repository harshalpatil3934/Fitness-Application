spring:
  application:
    name: activity-service
  data:
    mongodb:
      uri: mongodb://127.0.0.1:27017/fitnessactivity
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8082

logging:
  level:
    org.springframework.data.mongodb.core: DEBUG
    org.mongodb.driver.protocol.command: DEBUG

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: fitness.exchange
  queue:
    name: activity.queue
  routing:
    key: activity.tracking